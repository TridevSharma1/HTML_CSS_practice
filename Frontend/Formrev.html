<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>My First JavaScript</h1>

<button type="button" onclick="document.getElementById('demo').innerHTML = Date()">
Click me to display Date and Time.</button>

<p id="demo"></p>
<p id="demo1"></p>
<p id="demo2"></p>
<p id="demo3"></p>
<p id="demo4">A Paragraph.</p>

<button type="button" onclick="myFunction()">Try it</button>
<br><br>

Enter Name: <input type="text" id="name">
<button onclick="showName()">Submit</button>

<p id="result"></p>

Enter Value 1: <input type="text" id="a">
Enter Value 2: <input type="text" id="b">
<button onclick="sum()">sum</button>
<button onclick="sub()">sub</button>
<button onclick="mul()">mul</button>
<button onclick="div()">div</button>



<p id="result1"></p>


<script>
    
let x = 100 + 50;
document.getElementById("demo1").innerHTML = x;


let a = 3;
let y = (100 + 50) * a;
document.getElementById("demo2").innerHTML = y;
function showName() {
  let userName = document.getElementById("name").value;
  document.getElementById("result").innerHTML = "Hello " + userName + " Welcome to BCA Class.";
}
function sum() {
  let a = document.getElementById("a").value;
  let b = document.getElementById("b").value;
  document.getElementById("result1").innerHTML = "The sum is: " + (parseInt(a) + parseInt(b));
}
function sub() {
  let a = document.getElementById("a").value;
  let b = document.getElementById("b").value;
  document.getElementById("result1").innerHTML = "The difference is: " + (parseInt(a) - parseInt(b));
}
function mul() {
  let a = document.getElementById("a").value;
  let b = document.getElementById("b").value;
  document.getElementById("result1").innerHTML = "The product is: " + (parseInt(a) * parseInt(b));
}
function div() {
  let a = document.getElementById("a").value;
  let b = document.getElementById("b").value;
  document.getElementById("result1").innerHTML = "The quotient is: " + (parseInt(a) / parseInt(b));
}




document.getElementById("demo3").innerHTML = "Hello Tridev.";

function myFunction() {
  document.getElementById("demo4").innerHTML = "Paragraph changed Hi my friend how are you ?";
}

</script>
</body>
</html>
